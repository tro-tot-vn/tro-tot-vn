volumes:
  db-trototvn:

services:
  db-trototvn:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db-trototvn
    hostname: db-trototvn
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${Sa_Password:-00hihiHIHI-}
      - MSSQL_PID=Developer
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - 1433:1433
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/mssql:/var/opt/mssql
      - ${DOCKER_VOLUME_DIRECTORY:-.}/backup:/var/opt/mssql/backup
    restart: always
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${Sa_Password:-00hihiHIHI-}" -Q "SELECT 1" -C -t 30 || exit 1
      interval: 15s
      retries: 5
      start_period: 30s
      timeout: 10s

  sqlserver.configurator:
    image: mcr.microsoft.com/mssql-tools
    container_name: sqlserver.configurator
    volumes:
      - ./db:/scripts
      - ./backup:/backup
    depends_on:
      db-trototvn:
        condition: service_healthy
    entrypoint: >
      bash -c " echo 'Waiting for SQL Server to be fully ready...'; sleep 15; echo 'Running initialization scripts...'; chmod +x /scripts/run-scripts.sh; /scripts/run-scripts.sh \"${Sa_Password:-00hihiHIHI-}\"; "

  redis-trototvn:
    image: redis:7.0-alpine
    container_name: redis-trototvn
    hostname: redis-trototvn
    ports:
      - 5555:6379
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/redis:/data
    command: redis-server --appendonly yes --appendfsync everysec --save 60 1000
    restart: always

  redis-insight-trototvn:
    image: redis/redisinsight:2.68
    container_name: redis-insight-trototvn
    hostname: redis-insight-trototvn
    ports:
      - 5540:5540
    restart: always
    depends_on:
      - redis-trototvn
    environment:
      - RI_REDIS_PORT=6379
      - RI_REDIS_HOST=redis-trototvn

  monolith:
    build:
      context: ../../tro-tot-vn-be
      dockerfile: Dockerfile
    container_name: monolith
    environment:
      - PORT=3333
      - NODE_ENV=development
      - DB_HOST=db-trototvn
      - DB_PORT=1433
      - DB_USERNAME=sa
      - DB_PASSWORD=${Sa_Password:-00hihiHIHI-}
      - JWT_ACCESS_TOKEN_SECRET=6cf9d57d-7d6c-4ab5-8419-115ec872aabf
      - REDIS_HOST=redis-trototvn
      - REDIS_PORT=6379
    depends_on:
      db-trototvn:
        condition: service_healthy
      redis-trototvn:
        condition: service_started
    restart: always

  chat-service:
    build:
      context: ../../chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    environment:
      - PORT=8083
      - REDIS_HOST=redis-trototvn
      - REDIS_PORT=6379
    depends_on:
      - redis-trototvn
    restart: always

  krakend-gateway:
    image: devopsfaith/krakend:latest
    container_name: krakend-gateway
    volumes:
      - ../../gateway:/etc/krakend
    ports:
      - "8000:8000"
    command: ["run", "-d", "-c", "/etc/krakend/krakend-legacy.json"]
    depends_on:
      - monolith
      - chat-service
    restart: always

  # AI & Search Infra (Shared)
  minio-trototvn:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: minio-trototvn
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    restart: always

  milvus-trototvn:
    image: milvusdb/milvus:v2.6.2
    container_name: milvus-trototvn
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd-trototvn
      - minio-trototvn
    environment:
      ETCD_ENDPOINTS: etcd-trototvn:2379
      MINIO_ADDRESS: minio-trototvn:9000
    restart: always

  etcd-trototvn:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: etcd-trototvn
    command: etcd -advertise-client-urls=http://etcd-trototvn:2379 -listen-client-urls http://0.0.0.0:2379
    restart: always

networks:
  default:
    name: trototvn
