volumes:
  db-trototvn:

services:
  db-trototvn:
    image: postgres:15-alpine
    container_name: db-trototvn
    hostname: db-trototvn
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${Postgres_Password:-Password123}
      - POSTGRES_DB=trotot_db
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - 5432:5432
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/postgresql:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-trototvn:
    image: redis:7.0-alpine
    container_name: redis-trototvn
    ports:
      - 5555:6379
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/redis:/data
    restart: always

  redis-insight-trototvn:
    image: redis/redisinsight:2.68
    container_name: redis-insight-trototvn
    ports:
      - 5540:5540
    depends_on:
      - redis-trototvn
    restart: always

  auth-service:
    build:
      context: ../../auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      - DB_URL=postgres://postgres:Password123@db-trototvn:5432/trotot_db?sslmode=disable
      - REDIS_URL=redis://redis-trototvn:6379
      - JWT_PRIVATE_KEY_PATH=certs/private_key.pem
      - JWT_PUBLIC_KEY_PATH=certs/public_key.pem
      - PORT=8080
    depends_on:
      db-trototvn:
        condition: service_healthy
    restart: always

  profile-service:
    build:
      context: ../../profile-service
      dockerfile: Dockerfile
    container_name: profile-service
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=Password123
      - DB_HOST=db-trototvn
      - DB_PORT=5432
      - DB_NAME=trotot_db
      - REDIS_HOST=redis-trototvn
      - REDIS_PORT=6379
      - PORT=8081
    depends_on:
      db-trototvn:
        condition: service_healthy
    restart: always

  listing-service:
    build:
      context: ../../listing-service
      dockerfile: Dockerfile
    container_name: listing-service
    environment:
      - DB_URL=postgres://postgres:Password123@db-trototvn:5432/trotot_db?sslmode=disable
      - PORT=8082
    depends_on:
      db-trototvn:
        condition: service_healthy
    restart: always

  chat-service:
    build:
      context: ../../chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    environment:
      - PORT=8083
      - DATABASE_URL=postgres://postgres:Password123@db-trototvn:5432/trotot_db?sslmode=disable
      - REDIS_HOST=redis-trototvn
      - REDIS_PORT=6379
    depends_on:
      - redis-trototvn
    restart: always

  krakend-gateway:
    image: devopsfaith/krakend:latest
    container_name: krakend-gateway
    volumes:
      - ../../gateway:/etc/krakend
    ports:
      - "8000:8000"
    command: ["run", "-d", "-c", "/etc/krakend/krakend-modern.json"]
    depends_on:
      - auth-service
      - profile-service
      - listing-service
      - chat-service
    restart: always

  # Shared AI Infra
  minio-trototvn:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: minio-trototvn
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9002:9000"
    restart: always

  milvus-trototvn:
    image: milvusdb/milvus:v2.6.2
    container_name: milvus-trototvn
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd-trototvn
      - minio-trototvn
    environment:
      ETCD_ENDPOINTS: etcd-trototvn:2379
      MINIO_ADDRESS: minio-trototvn:9000
    restart: always

  etcd-trototvn:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: etcd-trototvn
    command: etcd -advertise-client-urls=http://etcd-trototvn:2379 -listen-client-urls http://0.0.0.0:2379
    restart: always

networks:
  default:
    name: trototvn
