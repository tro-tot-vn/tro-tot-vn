volumes:
  db-trototvn:
  caddy_data:
  caddy_config:

services:
  caddy:
    image: caddy:latest
    container_name: caddy-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - krakend-gateway
    restart: always

  db-trototvn:
    image: postgres:15-alpine
    container_name: db-trototvn
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=trotot_db
    volumes:
      - db-trototvn:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-trototvn:
    image: redis:7.0-alpine
    container_name: redis-trototvn
    restart: always

  auth-service:
    build:
      context: ../../auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      - DB_URL=postgres://postgres:${POSTGRES_PASSWORD}@db-trototvn:5432/trotot_db?sslmode=disable
      - REDIS_URL=redis://redis-trototvn:6379
      - JWT_PRIVATE_KEY_PATH=certs/private_key.pem
      - JWT_PUBLIC_KEY_PATH=certs/public_key.pem
    restart: always

  profile-service:
    build:
      context: ../../profile-service
      dockerfile: Dockerfile
    container_name: profile-service
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db-trototvn
      - REDIS_HOST=redis-trototvn
    restart: always

  listing-service:
    build:
      context: ../../listing-service
      dockerfile: Dockerfile
    container_name: listing-service
    environment:
      - DB_URL=postgres://postgres:${POSTGRES_PASSWORD}@db-trototvn:5432/trotot_db?sslmode=disable
    restart: always

  chat-service:
    build:
      context: ../../chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    environment:
      - PORT=8083
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@db-trototvn:5432/trotot_db?sslmode=disable
      - REDIS_HOST=redis-trototvn
    restart: always

  krakend-gateway:
    image: devopsfaith/krakend:latest
    container_name: krakend-gateway
    volumes:
      - ../../gateway:/etc/krakend
    command: ["run", "-d", "-c", "/etc/krakend/krakend-modern.json"]
    depends_on:
      - auth-service
      - profile-service
      - listing-service
      - chat-service
    restart: always

  # Shared AI Infra (Minimal Production)
  minio-trototvn:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: minio-trototvn
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    command: minio server /data
    restart: always

  milvus-trototvn:
    image: milvusdb/milvus:v2.6.2
    container_name: milvus-trototvn
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd-trototvn
      - minio-trototvn
    environment:
      ETCD_ENDPOINTS: etcd-trototvn:2379
      MINIO_ADDRESS: minio-trototvn:9000
    restart: always

  etcd-trototvn:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: etcd-trototvn
    command: etcd -advertise-client-urls=http://etcd-trototvn:2379 -listen-client-urls http://0.0.0.0:2379
    restart: always

networks:
  default:
    name: trototvn
